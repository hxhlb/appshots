name: macOS Release - Production

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: macos-release-production
  cancel-in-progress: false

jobs:
  build-and-release-production:
    name: Build, Sign, and Release
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      DEVELOPER_ID_KEYCHAIN_GZIP_BASE64: ${{ secrets.DEVELOPER_ID_KEYCHAIN_GZIP_BASE64 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      CLOUDFLARE_R2_ACCOUNT_ID: ${{ vars.CLOUDFLARE_R2_ACCOUNT_ID }}
      CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ vars.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
      NSUnbufferedIO: "YES"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Build
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Restore signing material
        run: |
          set -euo pipefail
          test -n "$DEVELOPER_ID_KEYCHAIN_GZIP_BASE64"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$SPARKLE_PRIVATE_KEY"
          mkdir -p DevKit/Keychain/SparkleKeys
          printf "%s" "$DEVELOPER_ID_KEYCHAIN_GZIP_BASE64" | base64 --decode | gunzip > DevKit/Keychain/Developer-ID-Keychain.keychain
          printf "%s" "$SPARKLE_PRIVATE_KEY" > DevKit/Keychain/SparkleKeys/private-key.txt
          chmod 600 DevKit/Keychain/Developer-ID-Keychain.keychain
          chmod 600 DevKit/Keychain/SparkleKeys/private-key.txt

      - name: Install DMG packaging dependencies
        working-directory: DevKit/Scripts
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Install AWS CLI
        run: |
          brew install awscli
          source DevKit/Scripts/shell-utils.sh
          ensure_path
          command -v aws

      - name: Resolve Swift packages
        timeout-minutes: 10
        run: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project Appshots.xcodeproj \
            -scheme Appshots \
            -derivedDataPath .build/DerivedData \
            -clonedSourcePackagesDirPath .build/SourcePackages

      - name: Build, Sign, Notarize and Package
        timeout-minutes: 45
        env:
          APPSHOTS_SKIP_R2_UPLOAD: "1"
        run: DevKit/Scripts/publish-with-build.sh

      - name: Extract version from app
        id: version
        run: |
          source DevKit/Scripts/project-env.sh
          load_app_version ".build/Appshots.xcarchive/Products/Applications/Appshots.app/Contents/Info.plist"

          echo "number=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=$APP_BUILD" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: artifacts/Appshots.dmg
          generate_release_notes: true

      - name: Upload Sparkle appcast and DMG to R2
        run: DevKit/Scripts/publish-submit-r2.sh .build/Appshots.dmg

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Upload DMG on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Appshots-dmg
          path: .build/Appshots.dmg
          if-no-files-found: ignore

      - name: Upload xcarchive on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Appshots-xcarchive
          path: .build/Appshots.xcarchive
          if-no-files-found: ignore
