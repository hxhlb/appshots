name: Appshots
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  kwwk-computer-use-core:
    path: kwwk-computer-use-core
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
targets:
  Appshots:
    type: application
    platform: macOS
    sources:
      - path: Sources/Appshots
        excludes:
          - Configuration
      - path: Resources/Assets.xcassets
    dependencies:
      - package: kwwk-computer-use-core
        product: KWWKComputerUseCore
      - package: Sparkle
        product: Sparkle
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleIconFile: AppIcon
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSAccessibilityUsageDescription: Appshots reads the active app's accessibility tree when you capture an appshot.
        NSHighResolutionCapable: true
        NSScreenCaptureUsageDescription: Appshots captures the active app window screenshot when you create an appshot.
        NSPrincipalClass: NSApplication
        SUAutomaticallyUpdate: true
        SUEnableAutomaticChecks: true
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: jlzQ6R5p1aKkqHcYvkVmbsP+D8ja/5IbPq/DsFNQWj4=
    configFiles:
      Debug: Sources/Appshots/Configuration/Version.xcconfig
      Release: Sources/Appshots/Configuration/Version.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kwwk.appshots
        PRODUCT_NAME: Appshots
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SPARKLE_FEED_URL: https://appshots.eyhn.in/production/appcast.xml
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
schemes:
  Appshots:
    build:
      targets:
        Appshots: all
    run:
      config: Debug
